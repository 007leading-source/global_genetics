<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias! - Global Genetics MX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a5f;
            --accent: #22c55e;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: var(--card);
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .icon {
            font-size: 64px;
            color: var(--accent);
            margin-bottom: 20px;
        }
        h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 15px;
        }
        p {
            color: #64748b;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 14px 30px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>¡Registro Exitoso!</h1>
        <p>Gracias por registrarte como Partner de <strong>Global Genetics MX</strong>. Tus datos han sido guardados correctamente en nuestro sistema.</p>
        <p>Pronto nos pondremos en contacto contigo para darte la bienvenida oficial.</p>
        <a href="https://globalgenetics.mx" class="btn">Visitar Sitio Web</a>
    </div>
</body>
</html>
